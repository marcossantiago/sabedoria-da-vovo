name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# ── Site deploy permissions ────────────────────────────────────────────────────
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── 1. Deploy Cloudflare Worker ──────────────────────────────────────────────
  deploy-worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - run: npm ci

      - name: Deploy worker
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── 2. Deploy GitHub Pages site ──────────────────────────────────────────────
  deploy-site:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Inject worker endpoint into config.js
        env:
          WORKER_ENDPOINT: ${{ vars.WORKER_ENDPOINT }}
        run: |
          [ -n "$WORKER_ENDPOINT" ] && \
            sed -i "s|apiEndpoint: '.*'|apiEndpoint: '$WORKER_ENDPOINT'|g" js/config.js || true

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
